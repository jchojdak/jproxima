name: CI Unit tests

on:
  push:
    branches:
      - master
      - feature/**

  pull_request:
    branches:
      - master
      - feature/**

jobs:
  setup-java:
    runs-on: ubuntu-latest
    outputs:
      java-version: "21"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        id: java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21
          cache: maven

  test-api:
    needs: setup-java
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use JDK 21 from setup
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Run API tests
        working-directory: api
        run: mvn clean test

  test-impl:
    needs: setup-java
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use JDK 21 from setup
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Run Impl tests
        working-directory: impl
        run: mvn clean test